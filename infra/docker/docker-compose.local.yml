# Local development databases for APILens.
#
# Production runs the same Postgres + ClickHouse + Redis on a single GCP VM via
# docker-compose; this file exists solely for offline / local-dev work.
#
# Run:        pnpm db:up      (or: docker compose -f infra/docker/docker-compose.local.yml up -d)
# Stop:       pnpm db:down
# Tail logs:  pnpm db:logs
#
# Apps read DATABASE_URL / CLICKHOUSE_URL / REDIS_URL — they don't care
# whether those point at this compose stack or at the cloud equivalents.

name: apilens-local

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apilens
      POSTGRES_PASSWORD: apilens_dev
      POSTGRES_DB: apilens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apilens -d apilens"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    # Docker's default seccomp profile blocks the NUMA syscalls (get_mempolicy,
    # set_mempolicy, ...) unless CAP_SYS_NICE is present, which makes ClickHouse
    # log a harmless "get_mempolicy: Operation not permitted" at startup.
    # Granting this one capability lets those syscalls through and silences it.
    cap_add:
      - SYS_NICE
    environment:
      CLICKHOUSE_DB: apilens
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_dev
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ports:
      - "8123:8123"   # HTTP interface (Django uses this via clickhouse-driver)
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      # Use 127.0.0.1, not localhost: inside the container wget resolves
      # localhost to IPv6 [::1], which ClickHouse doesn't bind, so the check
      # fails forever and the container is wrongly flagged unhealthy.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # Policy Decision Point — mirrors the prod OPA sidecar so local authz behaves
  # like production instead of always falling back to the DB guard. Loads the
  # same rego the VM ships via instance metadata (infra/opa/policies).
  # The host-run core API reaches it at http://localhost:8181 (set OPA_URL in
  # apps/api/.env).
  opa:
    image: openpolicyagent/opa:1.17.0
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--set=decision_logs.console=true"
      - "/policies"
    ports:
      - "8181:8181"
    volumes:
      - ../opa/policies:/policies:ro

volumes:
  postgres_data:
  clickhouse_data:
  redis_data:
