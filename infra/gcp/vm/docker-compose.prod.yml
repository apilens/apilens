# ============================================================================
# APILens single-VM production stack
# ----------------------------------------------------------------------------
# Runs the ENTIRE stack on one Compute Engine VM via docker compose:
#   caddy (reverse proxy + auto-HTTPS) -> web (Next.js) + api (Django/gunicorn)
#   api -> postgres + clickhouse + redis
#
# All values come from /opt/apilens/.env, which startup.sh builds on boot by
# reading VM metadata + Secret Manager. Do not commit real secrets here.
#
# The databases (postgres, clickhouse, redis) are NEVER published to host
# ports — they are reachable only over the internal compose network. Only
# caddy binds host ports 80/443.
# ============================================================================

name: apilens

# NOTE on env var names (confirmed against apps/api/config/settings.py +
# apps/api/.env.example):
#   - Postgres   -> APILENS_POSTGRES_URL   (postgresql://...)
#   - ClickHouse -> APILENS_CLICKHOUSE_URL (native protocol on port 9000)
#   - Media GCS  -> GS_BUCKET_NAME
x-db-env: &db-env
  APILENS_POSTGRES_URL: "postgresql://apilens:${POSTGRES_PASSWORD}@postgres:5432/apilens"
  APILENS_CLICKHOUSE_URL: "clickhouse://default:${CLICKHOUSE_PASSWORD}@clickhouse:9000/apilens"
  APILENS_REDIS_URL: "redis://redis:6379/0"

# Cap per-container log files. Docker's default json-file driver is UNBOUNDED, so
# without this the container logs grow until they fill /var/lib/docker on the boot
# disk. 10MB x 5 files = 50MB max per container. View logs with
# `docker compose -f docker-compose.prod.yml logs -f <service>`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # App host Caddy serves (or ":80" before a domain). The optional dedicated
      # api host is baked straight into the Caddyfile by startup.sh, so it needs
      # no env var here.
      APP_SITE: ${APP_SITE:-:80}
    volumes:
      - /opt/apilens/Caddyfile:/etc/caddy/Caddyfile:ro
      - /mnt/data/caddy/data:/data
      - /mnt/data/caddy/config:/config
    depends_on:
      - web
      - api

  web:
    image: "${REGISTRY_BASE}/frontend:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      PORT: "3000"
      DJANGO_API_URL: http://api:8000/api/v1
      # Auth/token calls go straight to the identity service over the internal
      # network (not back out through the public auth host). Bounded to /v1.
      AUTH_API_URL: http://identity:8000/v1
      SESSION_SECRET: ${SESSION_SECRET}
      # NOTE: NEXT_PUBLIC_API_URL is baked into the frontend image at BUILD
      # time (apps/web/Dockerfile + the deploy workflow). It is not set here.
    depends_on:
      - api
      - identity

  api:
    image: "${REGISTRY_BASE}/backend:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    logging: *default-logging
    environment: &api-env
      <<: *db-env
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      # RS256 access-token signing (identity issues, core verifies) + the shared
      # secret guarding the introspection endpoint (ingest -> identity). Both come
      # from Secret Manager via startup.sh -> .env; empty falls back to HS256.
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:-}
      INTERNAL_INTROSPECT_SECRET: ${INTERNAL_INTROSPECT_SECRET:-}
      # Authorization decisions delegated to the OPA policy engine (sidecar).
      OPA_URL: ${OPA_URL:-http://opa:8181/v1/data/apilens/authz/allow}
      FRONTEND_URL: ${FRONTEND_URL}
      # TLS is terminated at Caddy, which already redirects http->https at the
      # edge. Django must NOT also force the redirect: the web container calls
      # the API over plain http://api:8000 on the internal network, and a
      # Django 301->https would make Next's fetch hang on a TLS handshake
      # against the plaintext port (ConnectTimeout -> 500 on every UI action).
      DJANGO_SECURE_SSL_REDIRECT: "False"
      # HTTPS origins trusted for CSRF (admin/login POSTs) + browser CORS.
      # Caddy forwards X-Forwarded-Proto so Django still treats edge requests
      # as https (SECURE_PROXY_SSL_HEADER in settings).
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      PORT: "8000"
      GUNICORN_WORKERS: "4"
      GS_BUCKET_NAME: ${MEDIA_BUCKET}
      GS_PROJECT_ID: ${GS_PROJECT_ID:-}
      # Transactional email (magic links / verification) via Resend over SMTP.
      # Django's standard SMTP backend (apps/auth/email.py uses EmailMessage);
      # username is the literal "resend", password is the Resend API key
      # (EMAIL_HOST_PASSWORD, sourced from Secret Manager by startup.sh).
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: smtp.resend.com
      EMAIL_PORT: "587"
      EMAIL_USE_TLS: "True"
      EMAIL_HOST_USER: resend
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-APILens <noreply@apilens.ai>}
      # WebAuthn / passkey relying party. RP ID must be the page domain or a
      # registrable parent (apilens.ai covers app.apilens.ai); defaulting to
      # localhost — as before — is what caused the "not a registrable domain
      # suffix" error in prod.
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_RP_NAME: ${WEBAUTHN_RP_NAME:-APILens}
      # Sentry: errors + tracing + profiling + logs. DSN comes from GCP Secret
      # Manager via startup.sh -> .env (never committed); empty = disabled (no-op).
      # traces/profiles default to 1.0 (capture everything) — lower to save quota.
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-1.0}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-1.0}
      SENTRY_ENABLE_LOGS: ${SENTRY_ENABLE_LOGS:-True}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Identity (IAM) service — same backend image, full app, but Caddy routes only
  # /api/v1/auth/* here (login, magic-link, passkey, JWT issuance + JWKS, API-key
  # introspection). A separate container isolates auth and lets it scale apart.
  identity:
    # Dedicated identity (IAM) image, built from apps/identity (the backend
    # image with ROOT_URLCONF=config.urls_identity baked in) — so the bounded
    # auth-only surface is a property of the image, not a compose override.
    image: "${REGISTRY_BASE}/identity:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    logging: *default-logging
    environment:
      # Everything the auth flows need (DB, JWT key, email for magic-link,
      # WebAuthn, introspect secret) comes from the shared api env. The bounded
      # surface itself is baked into the identity image (ROOT_URLCONF).
      <<: *api-env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/v1/livez',timeout=4).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Standalone telemetry ingestion service (apps/ingest, FastAPI). Serves
  # ingest.apilens.ai — separate from the dashboard API. Reuses the same
  # Postgres (api keys, apps, endpoint discovery) + ClickHouse (api_requests /
  # api_logs) via *db-env. Waits for migrate so the base ClickHouse schema exists.
  ingest:
    image: "${REGISTRY_BASE}/ingest:${IMAGE_TAG:-latest}"
    restart: unless-stopped
    logging: *default-logging
    environment:
      <<: *db-env
      PORT: "8000"
      GUNICORN_WORKERS: "4"
      # Auth via the identity service's introspection endpoint (internal network)
      # instead of a direct key lookup. Same shared secret as identity.
      APILENS_INTROSPECT_URL: "http://identity:8000/v1/introspect"
      INTERNAL_INTROSPECT_SECRET: ${INTERNAL_INTROSPECT_SECRET:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      identity:
        condition: service_started

  # Policy Decision Point — externalized authorization (CNCF OPA), run as a
  # co-located sidecar. The core api delegates authz decisions here. Rego
  # policies are delivered to /opt/apilens/opa via instance metadata; decision
  # logs go to stdout (captured by docker logging) for audit.
  opa:
    image: openpolicyagent/opa:1.17.0
    restart: unless-stopped
    logging: *default-logging
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "--log-level=info"
      - "--set=decision_logs.console=true"
      - "/policies"
    volumes:
      - /opt/apilens/opa:/policies:ro

  # One-shot: apply Postgres migrations, then create/upgrade the ClickHouse
  # schema, then exit. The api service waits for this to complete successfully.
  # (`clickhouse_migrate` is a real management command in the codebase:
  # apps/api/core/database/clickhouse/management/commands/clickhouse_migrate.py)
  migrate:
    image: "${REGISTRY_BASE}/backend:${IMAGE_TAG:-latest}"
    restart: "no"
    logging: *default-logging
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py clickhouse_migrate"
    environment:
      <<: *db-env
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: apilens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: apilens
    volumes:
      - /mnt/data/postgres:/var/lib/postgresql/data
      - /opt/apilens/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apilens -d apilens"]
      interval: 5s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    restart: unless-stopped
    logging: *default-logging
    # Without SYS_NICE the server spins forever on the get_mempolicy() NUMA
    # syscall ("Operation not permitted") and never reaches "Ready for
    # connections" — granting it lets ClickHouse actually start.
    cap_add:
      - SYS_NICE
    environment:
      CLICKHOUSE_DB: apilens
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - /mnt/data/clickhouse:/var/lib/clickhouse
      # Force IPv4 listening: the default config binds only [::] (IPv6), which
      # fails on this host (IPv6 disabled) so ClickHouse binds nothing. This
      # drop-in makes it listen on 0.0.0.0 (8123 HTTP + 9000 native).
      - /opt/apilens/clickhouse-config/listen.xml:/etc/clickhouse-server/config.d/listen.xml:ro
    healthcheck:
      # Use 127.0.0.1, NOT localhost: localhost resolves to ::1 (IPv6) first,
      # which isn't bound (IPv6 disabled on this host) → false "unhealthy".
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8123/ping | grep -q Ok || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - /mnt/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
