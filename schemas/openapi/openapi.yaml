openapi: 3.1.0
info:
  title: APILens API
  version: 1.0.0
  description: API Observability Platform
paths:
  /api/v1/health:
    get:
      operationId: api_router_health_check
      summary: Health Check
      parameters: []
      responses:
        '200':
          description: OK
      tags:
      - System
  /api/v1/auth/magic-link:
    post:
      operationId: api_auth_router_request_magic_link
      summary: Request Magic Link
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MagicLinkRequest'
        required: true
  /api/v1/auth/identify:
    post:
      operationId: api_auth_router_identify
      summary: Identify
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentifyResponse'
      description: "Decide the best auth method for this email.\n\nReturns one of:\n  { method: \"passkey\", passkey_options:\
        \ {...} }   user has a passkey\n  { method: \"password\", twofa_required: bool }    user has a usable password\n \
        \ { method: \"magic_link_sent\" }                   magic-link-only user (link sent)\n  { method: \"no_account\" }\
        \                        no account exists for this email\n\nPreference order: passkey > password > magic-link (per\
        \ \"passkey wins\" UX decision).\nThe \"no_account\" branch does NOT send anything \u2014 the caller decides whether\n\
        to surface a signup CTA (login page) or proceed with signup (signup page).\nRate-limited per IP (10/min) to prevent\
        \ enumeration sweeps."
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentifyRequest'
        required: true
  /api/v1/auth/login:
    post:
      operationId: api_auth_router_login_with_password
      summary: Login With Password
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PasswordLoginResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordLoginRequest'
        required: true
  /api/v1/auth/2fa/exchange:
    post:
      operationId: api_auth_router_exchange_2fa_challenge
      summary: Exchange 2Fa Challenge
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      description: Exchange a 2fa_pending challenge token + code for real tokens.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorExchangeRequest'
        required: true
  /api/v1/auth/verify:
    post:
      operationId: api_auth_router_verify_magic_link
      summary: Verify Magic Link
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyRequest'
        required: true
  /api/v1/auth/refresh:
    post:
      operationId: api_auth_router_refresh_token
      summary: Refresh Token
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
        required: true
  /api/v1/auth/validate:
    post:
      operationId: api_auth_router_validate_session
      summary: Validate Session
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateRequest'
        required: true
  /api/v1/auth/logout:
    post:
      operationId: api_auth_router_logout
      summary: Logout
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
        required: true
  /api/v1/auth/password-reset/request:
    post:
      operationId: api_auth_router_request_password_reset
      summary: Request Password Reset
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetRequest'
        required: true
  /api/v1/auth/password-reset/verify:
    post:
      operationId: api_auth_router_verify_password_reset_token
      summary: Verify Password Reset Token
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetVerifyRequest'
        required: true
  /api/v1/auth/password-reset/reset:
    post:
      operationId: api_auth_router_reset_password
      summary: Reset Password
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordResetResetRequest'
        required: true
  /api/v1/auth/recovery/request:
    post:
      operationId: api_auth_router_recovery_request
      summary: Recovery Request
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: "Kick off the 48-hour recovery cooldown for an account with 2FA enabled.\n\nAlways returns a generic success\
        \ message \u2014 never reveals whether the email\nhas an account or whether that account has 2FA enabled (enumeration\
        \ guard)."
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRequestBody'
        required: true
  /api/v1/auth/recovery/status:
    get:
      operationId: api_auth_router_recovery_status
      summary: Recovery Status
      parameters:
      - in: query
        name: token
        schema:
          title: Token
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryStatusResponse'
      description: 'Public status check by token. Used by the recovery page to render the

        countdown / confirm / cancelled / expired states.'
      tags:
      - Auth
  /api/v1/auth/recovery/confirm:
    post:
      operationId: api_auth_router_recovery_confirm
      summary: Recovery Confirm
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: 'Disable 2FA + wipe backup codes + revoke sessions. Only succeeds once

        the cooldown has elapsed.'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryTokenBody'
        required: true
  /api/v1/auth/recovery/cancel:
    post:
      operationId: api_auth_router_recovery_cancel
      summary: Recovery Cancel
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: "Immediately invalidate a pending recovery request \u2014 the 'this wasn't me' button."
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryTokenBody'
        required: true
  /api/v1/auth/passkey/register/options:
    post:
      operationId: api_auth_router_passkey_register_options
      summary: Passkey Register Options
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationOptionsRequest'
        required: true
      security:
      - JWTBearer: []
  /api/v1/auth/passkey/register/verify:
    post:
      operationId: api_auth_router_passkey_register_verify
      summary: Passkey Register Verify
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyRegistrationVerifyRequest'
        required: true
      security:
      - JWTBearer: []
  /api/v1/auth/passkey/login/options:
    post:
      operationId: api_auth_router_passkey_login_options
      summary: Passkey Login Options
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                additionalProperties: true
                title: Response
                type: object
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationOptionsRequest'
        required: true
  /api/v1/auth/passkey/login/verify:
    post:
      operationId: api_auth_router_passkey_login_verify
      summary: Passkey Login Verify
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasskeyAuthenticationVerifyRequest'
        required: true
  /api/v1/auth/passkey/credentials:
    get:
      operationId: api_auth_router_list_passkey_credentials
      summary: List Passkey Credentials
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PasskeyCredentialResponse'
                title: Response
                type: array
      tags:
      - Auth
      security:
      - JWTBearer: []
  /api/v1/auth/passkey/credentials/{credential_id}:
    delete:
      operationId: api_auth_router_delete_passkey_credential
      summary: Delete Passkey Credential
      parameters:
      - in: path
        name: credential_id
        schema:
          title: Credential Id
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Auth
      security:
      - JWTBearer: []
  /api/v1/auth/2fa/status:
    get:
      operationId: api_auth_router_get_2fa_status
      summary: Get 2Fa Status
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorStatusResponse'
      description: Get current 2FA status for authenticated user.
      tags:
      - Auth
      security:
      - JWTBearer: []
  /api/v1/auth/2fa/enable:
    post:
      operationId: api_auth_router_enable_2fa
      summary: Enable 2Fa
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorEnableResponse'
      description: Enable 2FA and get QR code for scanning.
      tags:
      - Auth
      security:
      - JWTBearer: []
  /api/v1/auth/2fa/verify:
    post:
      operationId: api_auth_router_verify_2fa_setup
      summary: Verify 2Fa Setup
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCodesResponse'
      description: Verify TOTP code and activate 2FA. Requires password if the user has one.
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorVerifyRequest'
        required: true
      security:
      - JWTBearer: []
  /api/v1/auth/2fa/disable:
    post:
      operationId: api_auth_router_disable_2fa
      summary: Disable 2Fa
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: 'Disable 2FA for authenticated user.


        Accepts ONE of: current password, current TOTP code, or a backup code.

        Backup codes are the recovery path for users who''ve lost their authenticator

        AND don''t have a usable password (magic-link-only accounts).'
      tags:
      - Auth
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorDisableRequest'
        required: true
      security:
      - JWTBearer: []
  /api/v1/auth/2fa/backup-codes/regenerate:
    post:
      operationId: api_auth_router_regenerate_backup_codes
      summary: Regenerate Backup Codes
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BackupCodesResponse'
      description: Regenerate backup codes.
      tags:
      - Auth
      security:
      - JWTBearer: []
  /api/v1/users/me:
    get:
      operationId: api_users_router_get_current_user
      summary: Get Current User
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
    patch:
      operationId: api_users_router_update_current_user
      summary: Update Current User
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserProfileUpdateRequest'
        required: true
      security:
      - JWTBearer: []
    delete:
      operationId: api_users_router_delete_current_user
      summary: Delete Current User
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/context:
    get:
      operationId: api_users_router_get_user_context
      summary: Get User Context
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserContextResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/me/picture:
    post:
      operationId: api_users_router_upload_picture
      summary: Upload Picture
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PictureResponse'
      tags:
      - Users
      requestBody:
        content:
          multipart/form-data:
            schema:
              properties:
                file:
                  format: binary
                  title: File
                  type: string
              required:
              - file
              title: FileParams
              type: object
        required: true
      security:
      - JWTBearer: []
    delete:
      operationId: api_users_router_remove_picture
      summary: Remove Picture
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/me/password:
    post:
      operationId: api_users_router_set_password
      summary: Set Password
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetPasswordResponse'
      tags:
      - Users
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetPasswordRequest'
        required: true
      security:
      - JWTBearer: []
  /api/v1/users/logout-all:
    post:
      operationId: api_users_router_logout_all
      summary: Logout All
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/logout-others:
    post:
      operationId: api_users_router_logout_others
      summary: Logout Others
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: Revoke every refresh token except the family that issued the current access token.
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/sessions:
    get:
      operationId: api_users_router_list_sessions
      summary: List Sessions
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SessionResponse'
                title: Response
                type: array
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/users/sessions/{session_id}:
    delete:
      operationId: api_users_router_revoke_session
      summary: Revoke Session
      parameters:
      - in: path
        name: session_id
        schema:
          title: Session Id
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      tags:
      - Users
      security:
      - JWTBearer: []
  /api/v1/projects/:
    post:
      operationId: api_projects_router_create_project
      summary: Create Project
      parameters: []
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
      description: Create a new project.
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
        required: true
      security:
      - JWTBearer: []
    get:
      operationId: api_projects_router_list_projects
      summary: List Projects
      parameters: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ProjectListResponse'
                title: Response
                type: array
      description: List all projects for the authenticated user.
      tags:
      - Projects
      security:
      - JWTBearer: []
  /api/v1/projects/{project_slug}:
    get:
      operationId: api_projects_router_get_project
      summary: Get Project
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
      description: Get a specific project by slug.
      tags:
      - Projects
      security:
      - JWTBearer: []
    patch:
      operationId: api_projects_router_update_project
      summary: Update Project
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResponse'
      description: Update a project's details.
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectRequest'
        required: true
      security:
      - JWTBearer: []
    delete:
      operationId: api_projects_router_delete_project
      summary: Delete Project
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
      description: Soft delete a project (also soft-deletes all apps and revokes all API keys).
      tags:
      - Projects
      security:
      - JWTBearer: []
  /api/v1/projects/{project_slug}/apps:
    post:
      operationId: api_projects_router_create_app
      summary: Create App
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
      description: Create a new app within a project.
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppRequest'
        required: true
      security:
      - JWTBearer: []
    get:
      operationId: api_projects_router_list_apps
      summary: List Apps
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/AppListResponse'
                title: Response
                type: array
      description: List all apps in a project.
      tags:
      - Projects
      security:
      - JWTBearer: []
  /api/v1/projects/{project_slug}/apps/{app_slug}:
    get:
      operationId: api_projects_router_get_app
      summary: Get App
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      - in: path
        name: app_slug
        schema:
          title: App Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
      description: Get a specific app within a project.
      tags:
      - Projects
      security:
      - JWTBearer: []
    patch:
      operationId: api_projects_router_update_app
      summary: Update App
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      - in: path
        name: app_slug
        schema:
          title: App Slug
          type: string
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
      description: Update an app's details.
      tags:
      - Projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppRequest'
        required: true
      security:
      - JWTBearer: []
    delete:
      operationId: api_projects_router_delete_app
      summary: Delete App
      parameters:
      - in: path
        name: project_slug
        schema:
          title: Project Slug
          type: string
        required: true
      - in: path
        name: app_slug
