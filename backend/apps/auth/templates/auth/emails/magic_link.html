<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark">
  <title>Sign in to APILens</title>
  <style>
    :root { color-scheme: dark; }
  </style>
</head>
<body style="margin: 0; padding: 0; background-color: #000000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;">

  <!-- Hidden preheader -->
  <div style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">Your sign-in link — expires in 15 minutes.</div>

  <!-- Outer wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" role="presentation" style="background-color: #000000; padding: 40px 16px;">
    <tr>
      <td align="center">

        <!-- Card (max 560px wide) -->
        <table cellpadding="0" cellspacing="0" role="presentation" style="background-color: #111111; border-radius: 12px; border: 1px solid #1f1f1f; width: 100%; max-width: 560px;">

          <!-- Gradient top stripe (3px) -->
          <tr>
            <td style="height: 3px; background: linear-gradient(90deg, #0070f3 0%, #8b5cf6 100%); border-radius: 12px 12px 0 0; font-size: 0; line-height: 0;">&nbsp;</td>
          </tr>

          <!-- Logo header -->
          <tr>
            <td style="padding: 28px 36px 20px; border-bottom: 1px solid #1f1f1f;">
              <span style="font-size: 18px; font-weight: 700; color: #0070f3; letter-spacing: -0.3px;">APILens</span>
            </td>
          </tr>

          <!-- Body content -->
          <tr>
            <td style="padding: 32px 36px 28px;">
              <h1 style="margin: 0 0 16px 0; font-size: 22px; font-weight: 700; color: #ededed; letter-spacing: -0.3px; line-height: 1.3;">Sign in to APILens</h1>
              <p style="margin: 0 0 16px 0; font-size: 15px; line-height: 24px; color: #888888;">Click the button below to sign in to your APILens account.</p>

              <table cellpadding="0" cellspacing="0" role="presentation" style="margin: 28px 0 24px 0;">
                <tr>
                  <td style="background-color: #0070f3; border-radius: 8px; text-align: center;">
                    <a href="{{ verify_url }}" style="display: inline-block; padding: 13px 28px; font-size: 15px; font-weight: 600; color: #ffffff; text-decoration: none; white-space: nowrap; letter-spacing: -0.1px;">Sign in to APILens</a>
                  </td>
                </tr>
              </table>

              <p style="margin: 0 0 20px 0; font-size: 12px; line-height: 20px; color: #444444;">
                Or copy this link: <a href="{{ verify_url }}" style="color: #0070f3; text-decoration: underline; word-break: break-all;">{{ verify_url }}</a>
              </p>

              <p style="margin: 0; font-size: 13px; line-height: 20px; color: #555555;">This link expires in 15 minutes. If you didn't request this, you can safely ignore it.</p>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding: 20px 36px 28px; border-top: 1px solid #1f1f1f;">
              <p style="margin: 0; font-size: 12px; color: #444444; text-align: center; line-height: 18px;">
                APILens &bull; <a href="https://apilens.ai" style="color: #444444; text-decoration: none;">apilens.ai</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
